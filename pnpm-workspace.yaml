packages:
  - "packages/*"

# Hoist CLI tool binaries from peer dependencies.
# pnpm 11 only reads auth/registry from .npmrc; all other settings live here.
publicHoistPattern:
  - "*eslint*"
  - "*prettier*"
  - "*vitest*"
  - "typescript"
  - "*rimraf*"
  - "*cross-env*"

# Allow our freshly-published toolchain past the global minimumReleaseAge cooldown
minimumReleaseAgeExclude:
  - ts-builds@3.0.1

# tldjs ships with a bundled public-suffix list; its optional postinstall (a network refresh)
# is unnecessary for prosemeter-mcp, which uses somamcp over stdio only (no gateway/URL features).
allowBuilds:
  tldjs: false
